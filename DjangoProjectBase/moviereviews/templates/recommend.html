<h1>🎬 Recomendador de Películas</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="prompt" placeholder="Ej: película de guerra" required>
    <button type="submit">Buscar</button>
</form>

{% if movie %}
    <h2>Resultado:</h2>
    <h3>{{ movie.title }}</h3>

    {% if movie.image %}
        <img src="{{ movie.image.url }}" width="200">
    {% endif %}

    <p>{{ movie.description }}</p>
    <p>Similitud: {{ similarity }}</p>
{% endif %}
